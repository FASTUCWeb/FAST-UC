<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAST UC</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
}

.hero{
background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2000') center/cover;
height:450px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.65);
}

.hero-content{
position:relative;
text-align:center;
z-index:2;
}

.hero h1{
font-size:70px;
color:#ff9800;
text-shadow:0 0 20px #ff9800;
}

.hero p{
font-size:24px;
margin-top:10px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.order-box{
background:#161616;
border:2px solid #ff9800;
padding:25px;
border-radius:15px;
margin-top:-50px;
position:relative;
z-index:10;
}

.order-box h2{
margin-bottom:20px;
color:#ff9800;
}

input,select{
width:100%;
padding:15px;
margin-bottom:15px;
border-radius:10px;
border:none;
font-size:18px;
}

.btn{
width:100%;
padding:15px;
background:#25D366;
border:none;
color:white;
font-size:22px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.title{
text-align:center;
margin:40px 0 20px;
font-size:35px;
color:#ff9800;
}

.packages{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#161616;
border:2px solid #ff9800;
border-radius:15px;
padding:25px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.uc{
font-size:35px;
font-weight:bold;
color:#ff9800;
}

.price{
font-size:28px;
margin-top:10px;
}

.footer{
margin-top:40px;
text-align:center;
padding:20px;
background:#111;
}

.note{
color:#ccc;
}
</style>
</head>

<body>

<section class="hero">
<div class="hero-content">
<h1>FAST UC</h1>
<p>شحن شدات ببجي بسرعة وأمان</p>
</div>
</section>

<div class="container">

<div class="order-box">

<h2>اطلب شحنك الآن</h2>

<input type="text" id="playerid" placeholder="أدخل ID اللاعب">

<select id="package">

<option value="">اختر الباقة</option>

<option>60 UC - 60 جنيه</option>
<option>325 UC - 275 جنيه</option>
<option>660 UC - 560 جنيه</option>
<option>1800 UC - 1500 جنيه</option>
<option>3850 UC - 2850 جنيه</option>
<option>8100 UC - 6000 جنيه</option>
<option>16200 UC - 12000 جنيه</option>

</select>

<button class="btn" onclick="sendOrder()">
إرسال الطلب عبر واتساب
</button>

</div>

<h2 class="title">الباقات المتاحة</h2>

<div class="packages">

<div class="card">
<div class="uc">60 UC</div>
<div class="price">60 جنيه</div>
</div>

<div class="card">
<div class="uc">325 UC</div>
<div class="price">275 جنيه</div>
</div>

<div class="card">
<div class="uc">660 UC</div>
<div class="price">560 جنيه</div>
</div>

<div class="card">
<div class="uc">1800 UC</div>
<div class="price">1500 جنيه</div>
</div>

<div class="card">
<div class="uc">3850 UC</div>
<div class="price">2850 جنيه</div>
</div>

<div class="card">
<div class="uc">8100 UC</div>
<div class="price">6000 جنيه</div>
</div>

<div class="card">
<div class="uc">16200 UC</div>
<div class="price">12000 جنيه</div>
</div>

</div>

</div>

<div class="footer">
<p class="note">
بعد الضغط على إرسال الطلب سيتم فتح واتساب تلقائيًا لإرسال البيانات.
</p>
</div>

<script>
function sendOrder(){

let id=document.getElementById("playerid").value;
let pack=document.getElementById("package").value;

if(id=="" || pack==""){
alert("يرجى إدخال ID اللاعب واختيار الباقة");
return;
}

let msg=
"طلب شحن جديد%0A%0A"+
"ID اللاعب: "+id+"%0A"+
"الباقة: "+pack;

window.open(
"https://wa.me/201012024274?text="+msg,
"_blank"
);

}
</script>

</body>
</html>
