<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast UC</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

header{
    background:#ff9800;
    padding:20px;
    font-size:26px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button{
    background:#25D366;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1ebe5d;
}
</style>
</head>

<body>

<header>FAST UC ⚡</header>

<div class="container">

    <h3>شحن شدات ببجي بسرعة وأمان</h3>

    <input type="text" id="playerId" placeholder="اكتب ID اللاعب">

    <select id="package">
        <option value="60 UC">60 UC</option>
        <option value="325 UC">325 UC</option>
        <option value="660 UC">660 UC</option>
        <option value="1800 UC">1800 UC</option>
        <option value="3850 UC">3850 UC</option>
        <option value="8100 UC">8100 UC</option>
        <option value="12000 UC">12000 UC</option>
        <option value="30000 UC">30000 UC</option>
    </select>

    <button onclick="sendWhatsApp()">إرسال الطلب</button>

</div>

<script>
function sendWhatsApp(){

    let id = document.getElementById("playerId").value;
    let pack = document.getElementById("package").value;

    if(id === ""){
        alert("من فضلك أدخل ID اللاعب");
        return;
    }

    let message =
`طلب شحن شدات ببجي

ID اللاعب: ${id}
الباقة: ${pack}`;

    // ضع رقمك هنا
    let phone = "201XXXXXXXXX";

    window.open(
        "https://wa.me/" + phone + "?text=" + encodeURIComponent(message),
        "_blank"
    );
}
</script>

</body>
</html>
